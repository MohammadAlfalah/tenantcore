server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend container. Because the browser talks only to this nginx
    # (for both the app and /api), requests are same-origin and no CORS is involved.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: every non-file route serves index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
